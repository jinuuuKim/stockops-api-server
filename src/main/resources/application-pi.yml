spring:
  datasource:
    url: ${STOCKOPS_DATASOURCE_URL:jdbc:postgresql://192.168.0.11:5432/stockops}
    username: ${STOCKOPS_DATASOURCE_USERNAME:stockops}
    password: ${STOCKOPS_DATASOURCE_PASSWORD:stockops}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: db
  health:
    db:
      enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.stockops: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/stockops-pi.log}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

stockops:
  sensimul:
    base-url: ${STOCKOPS_SENSIMUL_BASE_URL:http://192.168.0.11:18080}

sms:
  enabled: ${SMS_ENABLED:false}
  twilio:
    account-sid: ${SMS_TWILIO_ACCOUNT_SID:}
    auth-token: ${SMS_TWILIO_AUTH_TOKEN:}
    from-number: ${SMS_TWILIO_FROM_NUMBER:}

kakao:
  enabled: ${KAKAO_ENABLED:false}
  api-key: ${KAKAO_API_KEY:}
  sender-key: ${KAKAO_SENDER_KEY:}
  base-url: ${KAKAO_BASE_URL:}

email:
  enabled: ${EMAIL_ENABLED:false}
  from: ${EMAIL_FROM:noreply@stockops.local}

webhook:
  slack:
    url: ${WEBHOOK_SLACK_URL:}
  notion:
    url: ${WEBHOOK_NOTION_URL:}
  discord:
    url: ${WEBHOOK_DISCORD_URL:}
  teams:
    url: ${WEBHOOK_TEAMS_URL:}
