<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockOps 비밀번호 재설정</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 32px 24px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .header p { margin: 12px 0 0; opacity: 0.9; font-size: 14px; }
        .content { padding: 32px 24px; }
        .info-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 16px; margin-bottom: 24px; color: #0369a1; font-size: 14px; }
        .info-box strong { font-weight: 600; }
        .token-box { background: #1e293b; color: #f8fafc; padding: 16px 24px; border-radius: 8px; text-align: center; font-family: 'Courier New', monospace; font-size: 20px; letter-spacing: 2px; margin-bottom: 24px; }
        .expiry { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 24px; }
        .expiry strong { color: #dc2626; }
        .action-button { display: block; width: 100%; background: linear-gradient(135deg, #16a34a, #15803d); color: white; padding: 16px 24px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 16px; text-align: center; box-sizing: border-box; }
        .action-button:hover { background: linear-gradient(135deg, #15803d, #166534); }
        .warning { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px; padding: 16px; margin-top: 24px; color: #92400e; font-size: 13px; text-align: center; }
        .footer { background: #f8fafc; padding: 16px 24px; text-align: center; color: #64748b; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔑 비밀번호 재설정</h1>
            <p>StockOps 계정의 비밀번호 재설정을 요청하셨습니다.</p>
        </div>
        <div class="content">
            <div class="info-box">
                이 요청을 본인이 직접 하신 것이 아니라면, 이 이메일을 무시하시기 바랍니다.<br>
               他人による操作の場合は、このメールを無視してください。
            </div>

            <div class="token-box" th:text="${resetToken}">ABCD-1234-EFGH-5678</div>

            <p class="expiry">
                유효 기간: <strong><span th:text="${expirationHours}">24</span>시간</strong><br>
                생성 일시: <span th:text="${generatedAt}">2024-01-08 14:30</span>
            </p>

            <a href="#" class="action-button" th:href="${resetUrl}">비밀번호 재설정하기</a>

            <div class="warning">
                ⚠️ 해당 링크는 <strong>1회</strong>만 사용 가능하며, 유효 기간过后 자동失效합니다.
            </div>
        </div>
        <div class="footer">
            StockOps 스마트 재고 관리 시스템<br>
            본 이메일은 자동 발송되었습니다.返信不要.
        </div>
    </div>
</body>
</html>
