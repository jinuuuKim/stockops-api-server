spring:
  application:
    name: stockops
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    # {vendor} resolves to the active database (postgresql in deployments, h2 in tests).
    # PostgreSQL-only DDL (e.g. partial indexes) lives under db/vendor/postgresql so the
    # H2 test database skips it without breaking the shared migration history.
    locations: classpath:db/migration,classpath:db/vendor/{vendor}
    fail-on-missing-locations: false
  data:
    redis:
      repositories:
        enabled: false
  profiles:
    default: local

server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%level] [%thread] %logger{36} - %msg%n"
  level:
    # CRUD request/response logging — READ (GET) logs at DEBUG, hidden in prod.
    # Override per-profile: local/dev use DEBUG so read operations are visible.
    com.stockops.logging: INFO

management:
  endpoints:
    web:
      exposure:
        include: ${STOCKOPS_ACTUATOR_EXPOSURE:health,info,metrics,prometheus}
  health:
    redis:
      enabled: ${STOCKOPS_REDIS_ENABLED:true}
    circuitbreakers:
      enabled: true
  endpoint:
    health:
      show-details: ${STOCKOPS_ACTUATOR_HEALTH_SHOW_DETAILS:never}
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${STOCKOPS_ENVIRONMENT:local}
  # OpenTelemetry tracing (Phase 1: traces only; metrics stay on Prometheus).
  # Sampling and endpoint are env-driven; the default localhost endpoint is safe
  # to commit and harmless if no collector is listening (exporter just logs and drops).
  tracing:
    enabled: ${STOCKOPS_TRACING_ENABLED:true}
    sampling:
      probability: ${STOCKOPS_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${STOCKOPS_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      bedrock:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 15s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.stockops.exception.RateLimitExceededException

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

stockops:
  redis:
    enabled: true
  cors:
    allowed-origins: ${STOCKOPS_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  sensimul:
    base-url: ${STOCKOPS_SENSIMUL_BASE_URL:http://localhost:18080}
    connect-timeout: 5s
    read-timeout: 15s
  retention:
    retention-days: 30
    batch-size: 1000
    enabled: true
  mqtt-ingestion:
    enabled: ${STOCKOPS_MQTT_INGESTION_ENABLED:true}
    broker-url: ${STOCKOPS_MQTT_INGESTION_BROKER_URL:tcp://localhost:1883}
    qos: ${STOCKOPS_MQTT_INGESTION_QOS:1}
    client-id: ${STOCKOPS_MQTT_INGESTION_CLIENT_ID:}
  sqs-ingestion:
    enabled: ${STOCKOPS_SQS_INGESTION_ENABLED:false}
    queue-url: ${STOCKOPS_SQS_INGESTION_QUEUE_URL:}
    region: ${STOCKOPS_SQS_INGESTION_REGION:ap-northeast-2}
    max-messages: ${STOCKOPS_SQS_INGESTION_MAX_MESSAGES:10}
    wait-time-seconds: ${STOCKOPS_SQS_INGESTION_WAIT_TIME_SECONDS:20}
    visibility-timeout-seconds: ${STOCKOPS_SQS_INGESTION_VISIBILITY_TIMEOUT_SECONDS:30}
    error-backoff-millis: ${STOCKOPS_SQS_INGESTION_ERROR_BACKOFF_MILLIS:5000}
  sensor-cache:
    recent-window: ${STOCKOPS_SENSOR_CACHE_RECENT_WINDOW:10m}
    key-ttl: ${STOCKOPS_SENSOR_CACHE_KEY_TTL:15m}
    key-prefix: ${STOCKOPS_SENSOR_CACHE_KEY_PREFIX:stockops:sensor:readings}
  command-messaging:
    # When false (default) controller commands use the legacy HTTP path to Sensimul.
    # When true they publish to the broker (Mosquitto on-prem / AWS IoT Core endpoint) and are
    # finalized by the ACK subscriber. Works on every load-balanced instance (ACK is idempotent).
    enabled: ${STOCKOPS_COMMAND_MESSAGING_ENABLED:false}
    broker-url: ${STOCKOPS_COMMAND_MESSAGING_BROKER_URL:tcp://localhost:1883}
    qos: ${STOCKOPS_COMMAND_MESSAGING_QOS:1}
    client-id: ${STOCKOPS_COMMAND_MESSAGING_CLIENT_ID:}
    ack-timeout: ${STOCKOPS_COMMAND_MESSAGING_ACK_TIMEOUT:30s}
  environment:
    door-open-warning-duration: ${STOCKOPS_DOOR_OPEN_WARNING_DURATION:PT5M}
    alert-outbox:
      enabled: ${STOCKOPS_ALERT_OUTBOX_ENABLED:true}
      poll-interval: ${STOCKOPS_ALERT_OUTBOX_POLL_INTERVAL:PT15S}
      batch-size: ${STOCKOPS_ALERT_OUTBOX_BATCH_SIZE:20}
      max-attempts: ${STOCKOPS_ALERT_OUTBOX_MAX_ATTEMPTS:5}
  analytics:
    enabled: true
    business-zone: Asia/Seoul
    incremental-lookback-days: 30
    backfill-days: 365
    refresh-cron: 0 15 1 * * ?
    backfill-cron: 0 0 2 * * SUN
  ai:
    enabled: true
    business-zone: Asia/Seoul
    forecast-history-days: 28
    trailing-average-days: 7
    same-weekday-lookback-weeks: 4
    lead-time-lookback-days: 90
    default-lead-time-days: 1
    daily-cron: 0 45 1 * * ?
    # Intraday forecast proposals: live-data reorder proposals run a few times during the day,
    # accumulated per slot. Disabled by default so it never fires live forecasts in local/test.
    intraday:
      enabled: ${STOCKOPS_AI_INTRADAY_ENABLED:false}
      # Default slots: 10:00 and 15:00 in business-zone.
      slots-cron: ${STOCKOPS_AI_INTRADAY_SLOTS_CRON:0 0 10,15 * * ?}
      business-zone: ${STOCKOPS_AI_INTRADAY_BUSINESS_ZONE:Asia/Seoul}
      # Days a proposal stays approvable/rejectable from its run; afterwards history-only.
      actionable-days: ${STOCKOPS_AI_INTRADAY_ACTIONABLE_DAYS:3}
      # Daily sweep flipping past-window open proposals to EXPIRED.
      expiry-cron: ${STOCKOPS_AI_INTRADAY_EXPIRY_CRON:0 30 0 * * ?}
      # Optional forecast model id of a registered ForecastModel; blank uses the statistical model.
      forecast-model: ${STOCKOPS_AI_INTRADAY_FORECAST_MODEL:}
      notify:
        enabled: ${STOCKOPS_AI_INTRADAY_NOTIFY_ENABLED:false}
        min-recommended-quantity: ${STOCKOPS_AI_INTRADAY_NOTIFY_MIN_QTY:1}
        max-items: ${STOCKOPS_AI_INTRADAY_NOTIFY_MAX_ITEMS:10}
    bedrock:
      enabled: ${STOCKOPS_BEDROCK_ENABLED:false}
      region: ${STOCKOPS_BEDROCK_REGION:ap-northeast-2}
      # Dedicated Bedrock credentials. Use these (NOT AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY) so
      # Bedrock can target a different AWS account than SQS ingestion, which stays on IRSA via the
      # default credential chain. Leave blank to let Bedrock use the default chain too.
      access-key-id: ${STOCKOPS_BEDROCK_AWS_ACCESS_KEY_ID:}
      secret-access-key: ${STOCKOPS_BEDROCK_AWS_SECRET_ACCESS_KEY:}
      model-id: ${STOCKOPS_BEDROCK_MODEL_ID:}
      inference-profile-arn: ${STOCKOPS_BEDROCK_INFERENCE_PROFILE_ARN:}
      knowledge-base-id: ${STOCKOPS_BEDROCK_KNOWLEDGE_BASE_ID:}
      agent-id: ${STOCKOPS_BEDROCK_AGENT_ID:}
      agent-alias-id: ${STOCKOPS_BEDROCK_AGENT_ALIAS_ID:}
      # read-timeout bounds each streamed agent turn; raise it for long multi-tool agent runs.
      connect-timeout: ${STOCKOPS_BEDROCK_CONNECT_TIMEOUT:5s}
      read-timeout: ${STOCKOPS_BEDROCK_READ_TIMEOUT:20s}
      # Guardrail attached to Converse requests; applied only when both id and version are set.
      guardrail-id: ${STOCKOPS_BEDROCK_GUARDRAIL_ID:}
      guardrail-version: ${STOCKOPS_BEDROCK_GUARDRAIL_VERSION:}
      # Max tool-use round trips per assistant turn (direct Converse tool-use loop).
      max-tool-turns: ${STOCKOPS_BEDROCK_MAX_TOOL_TURNS:5}
      # Applied to every Converse request via inferenceConfig: low temperature => deterministic,
      # max-output-tokens caps verbosity. Tune these for response cleanliness.
      max-output-tokens: ${STOCKOPS_BEDROCK_MAX_OUTPUT_TOKENS:1200}
      temperature: ${STOCKOPS_BEDROCK_TEMPERATURE:0.2}
      # Optional system-prompt override; blank => built-in DEFAULT_SYSTEM_PROMPT is used.
      system-prompt: ${STOCKOPS_BEDROCK_SYSTEM_PROMPT:}
      ops-summary-schedule:
        enabled: ${STOCKOPS_AI_OPS_SUMMARY_SCHEDULE_ENABLED:false}
        cron: ${STOCKOPS_AI_OPS_SUMMARY_CRON:0 0 8 * * ?}
        zone: Asia/Seoul
    rag:
      rate-limit:
        requests-per-minute: ${STOCKOPS_AI_RAG_RATE_LIMIT:10}
    vertex:
      enabled: ${STOCKOPS_VERTEX_AI_ENABLED:false}
      project-id: ${STOCKOPS_VERTEX_AI_PROJECT_ID:}
      location: ${STOCKOPS_VERTEX_AI_LOCATION:us-central1}
      model-id: ${STOCKOPS_VERTEX_AI_MODEL_ID:gemini-2.5-flash}
      credentials-json: ${STOCKOPS_VERTEX_AI_CREDENTIALS_JSON:}
      fallback-notice: ${STOCKOPS_AI_FALLBACK_NOTICE:기본 제공 모델의 연결이 불안정하여 보조 시스템으로 우회합니다.}
      no-service-notice: ${STOCKOPS_AI_NO_SERVICE_NOTICE:연동된 AI서비스가 없습니다.}
      unauthenticated-notice: ${STOCKOPS_AI_UNAUTHENTICATED_NOTICE:인증된 AI서비스가 없습니다.}
  ai-service:
    url: ${STOCKOPS_AI_SERVICE_URL:http://localhost:8000}
    api-key: ${STOCKOPS_AI_SERVICE_API_KEY:}
    connect-timeout: 5s
    read-timeout: 5s
    circuit-breaker-failure-threshold: 3
    circuit-breaker-cooldown: 30s

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:stockops;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

logging:
  level:
    com.stockops.logging: DEBUG   # show READ (GET) logs in local

stockops:
  redis:
    enabled: false
  ratelimit:
    enabled: false
  actuator:
    # Local dev has no reverse proxy in front, so allow unauthenticated scraping.
    # All other profiles keep the secure default (authenticated).
    prometheus-public: true

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${STOCKOPS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockops}
    username: ${STOCKOPS_DATASOURCE_USERNAME:stockops}
    password: ${STOCKOPS_DATASOURCE_PASSWORD:stockops}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    com.stockops.logging: DEBUG   # show READ (GET) logs in dev/docker

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${STOCKOPS_DATASOURCE_URL}
    username: ${STOCKOPS_DATASOURCE_USERNAME}
    password: ${STOCKOPS_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
