spring:
  application:
    name: stockops
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  data:
    redis:
      repositories:
        enabled: false
  profiles:
    default: local

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: ${STOCKOPS_REDIS_ENABLED:true}
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

webhook:
  slack:
    url: ${WEBHOOK_SLACK_URL:}
  notion:
    url: ${WEBHOOK_NOTION_URL:}
  discord:
    url: ${WEBHOOK_DISCORD_URL:}
  teams:
    url: ${WEBHOOK_TEAMS_URL:}

stockops:
  redis:
    enabled: true
  cors:
    allowed-origins: ${STOCKOPS_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  sensimul:
    base-url: ${STOCKOPS_SENSIMUL_BASE_URL:http://localhost:18080}
    connect-timeout: 5s
    read-timeout: 15s
  retention:
    retention-days: 30
    batch-size: 1000
    enabled: true
  mqtt-ingestion:
    enabled: ${STOCKOPS_MQTT_INGESTION_ENABLED:true}
    broker-url: ${STOCKOPS_MQTT_INGESTION_BROKER_URL:tcp://localhost:1883}
    qos: ${STOCKOPS_MQTT_INGESTION_QOS:1}
    client-id: ${STOCKOPS_MQTT_INGESTION_CLIENT_ID:}
  analytics:
    enabled: true
    business-zone: Asia/Seoul
    incremental-lookback-days: 30
    backfill-days: 365
    refresh-cron: 0 15 1 * * ?
    backfill-cron: 0 0 2 * * SUN
  ai:
    enabled: true
    business-zone: Asia/Seoul
    forecast-history-days: 28
    trailing-average-days: 7
    same-weekday-lookback-weeks: 4
    lead-time-lookback-days: 90
    default-lead-time-days: 1
    daily-cron: 0 45 1 * * ?
  ai-service:
    url: ${STOCKOPS_AI_SERVICE_URL:http://localhost:8000}
    connect-timeout: 5s
    read-timeout: 5s
    circuit-breaker-failure-threshold: 3
    circuit-breaker-cooldown: 30s
  ai.gemini:
    api-key: ${GEMINI_API_KEY:}
    enabled: ${GEMINI_ENABLED:false}
    model-name: gemini-pro
    max-tokens: 1024

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:stockops;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  mail:
    host: localhost
    port: 2525

stockops:
  redis:
    enabled: false
  ratelimit:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${STOCKOPS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockops}
    username: ${STOCKOPS_DATASOURCE_USERNAME:stockops}
    password: ${STOCKOPS_DATASOURCE_PASSWORD:stockops}
    driver-class-name: org.postgresql.Driver

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${STOCKOPS_DATASOURCE_URL}
    username: ${STOCKOPS_DATASOURCE_USERNAME}
    password: ${STOCKOPS_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
